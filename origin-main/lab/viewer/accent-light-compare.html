<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accent light surface — step comparison</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', system-ui, sans-serif; background: #f5f4f3; color: #090404; -webkit-font-smoothing: antialiased; }
.page { max-width: 1100px; margin: 0 auto; padding: 48px 24px; }
h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.sub { font-size: 14px; color: #554e4d; margin-bottom: 40px; }
h2 { font-size: 16px; font-weight: 700; margin-bottom: 16px; margin-top: 40px; }
h2:first-of-type { margin-top: 0; }
.grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
.card { background: #fff; border-radius: 12px; border: 1px solid #e6e4e4; overflow: hidden; }
.card-header { padding: 10px 14px; font-size: 11px; font-weight: 700; border-bottom: 1px solid #e6e4e4; color: #554e4d; }
.banner { margin: 12px; border-radius: 8px; padding: 14px 16px; display: flex; flex-direction: column; gap: 6px; }
.banner .title { font-size: 14px; font-weight: 600; }
.banner .body { font-size: 12px; opacity: 0.85; }
.banner .meta { font-size: 10px; opacity: 0.6; margin-top: 4px; }
.badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 4px; }
.badge.pass { background: #d4ffda; color: #006127; }
.badge.fail { background: #ffedeb; color: #99000b; }
.dark .card { background: #16100f; border-color: #3a3433; }
.dark .card-header { border-color: #3a3433; color: #938e8d; }
.chip-row { display: flex; gap: 8px; margin: 0 12px 12px; flex-wrap: wrap; }
.chip { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; }
</style>
</head>
<body>
<div class="page">
<h1>Accent light surface — step comparison</h1>
<p class="sub">Comparing blue-50, blue-100, and blue-200 for the accent light/subtle surface. Also showing error/success for reference.</p>

<div id="content"></div>
</div>
<script>
const BLUE = { 50:'#f8faff', 100:'#edf2ff', 200:'#dbe4ff', 300:'#bbccff', 700:'#2e3eb1', 600:'#4e68f4' };
const RED = { 50:'#fff8f7', 100:'#ffedeb', 200:'#ffdbd6', 700:'#99000b', 600:'#dc2626' };
const GREEN = { 50:'#f0fff2', 100:'#d4ffda', 200:'#aefabb', 700:'#006127', 600:'#008539' };
const YELLOW = { 100:'#fff0d1', 700:'#654b00', 400:'#eab308' };
const N = { 50:'#ffffff', 950:'#16100f', 1000:'#090404' };

// Dark mode versions
const BLUE_D = { 900:'#0d134d', 950:'#060a35', 300:'#bbccff', 700:'#2e3eb1' };
const RED_D = { 900:'#3e0002', 950:'#2a0001', 300:'#ffbab1', 700:'#99000b' };
const GREEN_D = { 900:'#00250a', 950:'#001705', 300:'#8ce69e', 700:'#006127' };

function lum(hex) {
  const r = parseInt(hex.slice(1,3),16)/255, g = parseInt(hex.slice(3,5),16)/255, b = parseInt(hex.slice(5,7),16)/255;
  const f = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  return 0.2126*f(r) + 0.7152*f(g) + 0.0722*f(b);
}
function cr(a,b) { const l1=Math.max(lum(a),lum(b)), l2=Math.min(lum(a),lum(b)); return ((l1+0.05)/(l2+0.05)).toFixed(1); }

function makeCard(label, bg, text, border, textLabel) {
  const ratio = cr(bg, text);
  const pass = parseFloat(ratio) >= 4.5;
  return `
    <div class="card">
      <div class="card-header">${label}</div>
      <div class="banner" style="background:${bg};color:${text};border:1.5px solid ${border};">
        <div class="title">New features available</div>
        <div class="body">Check out the latest updates to your account settings and preferences.</div>
        <div class="meta">${textLabel}</div>
        <span class="badge ${pass?'pass':'fail'}">${ratio}:1</span>
      </div>
      <div class="chip-row">
        <span class="chip" style="background:${bg};color:${text};border:1px solid ${border};">Tag</span>
        <span class="chip" style="background:${bg};color:${text};border:1px solid ${border};">Label</span>
      </div>
    </div>`;
}

const el = document.getElementById('content');
let html = '';

// ── ACCENT ──
html += '<h2>Accent light surface — light mode</h2><div class="grid">';
html += makeCard('blue-50 (current)', BLUE[50], BLUE[700], BLUE[600], 'blue-50 + blue-700');
html += makeCard('blue-100', BLUE[100], BLUE[700], BLUE[600], 'blue-100 + blue-700');
html += makeCard('blue-200', BLUE[200], BLUE[700], BLUE[600], 'blue-200 + blue-700');
html += makeCard('For reference: warning', YELLOW[100], YELLOW[700], YELLOW[400], 'yellow-100 + yellow-700');
html += '</div>';

// ── ERROR + SUCCESS for reference ──
html += '<h2>Error + success light surfaces — for reference</h2><div class="grid">';
html += makeCard('error: red-50', RED[50], RED[700], RED[600], 'red-50 + red-700');
html += makeCard('error: red-100', RED[100], RED[700], RED[600], 'red-100 + red-700');
html += makeCard('success: green-50', GREEN[50], GREEN[700], GREEN[600], 'green-50 + green-700');
html += makeCard('success: green-100', GREEN[100], GREEN[700], GREEN[600], 'green-100 + green-700');
html += '</div>';

// ── DARK MODE ──
html += '<h2>Accent light surface — dark mode</h2><div class="grid dark">';
html += makeCard('blue-950 (current)', BLUE_D[950], BLUE_D[300], BLUE_D[700], 'blue-950 + blue-300');
html += makeCard('blue-900', BLUE_D[900], BLUE_D[300], BLUE_D[700], 'blue-900 + blue-300');
html += '</div>';

html += '<h2>Error + success light surfaces — dark mode</h2><div class="grid dark">';
html += makeCard('error: red-950', RED_D[950], RED_D[300], RED_D[700], 'red-950 + red-300');
html += makeCard('error: red-900', RED_D[900], RED_D[300], RED_D[700], 'red-900 + red-300');
html += makeCard('success: green-950', GREEN_D[950], GREEN_D[300], GREEN_D[700], 'green-950 + green-300');
html += makeCard('success: green-900', GREEN_D[900], GREEN_D[300], GREEN_D[700], 'green-900 + green-300');
html += '</div>';

el.innerHTML = html;
</script>
</body>
</html>
