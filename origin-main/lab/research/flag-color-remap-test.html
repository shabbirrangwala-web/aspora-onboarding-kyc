.st{font-size:11px;color:#888;margin-bottom:32px;padding:12px 16px;background:rgba(255,255,255,.03);border-radius:8px;display:inline-block}

</style>

<h1>Flag color remap — brand-anchor-first</h1>
<p class="sub">Every flag color mapped to the nearest Aspora primitive using OKLAB perceptual distance. 70 flags of varying complexity. Review for recognizability and brand coherence.</p>
<div class="pal" id="pal"></div>
<div class="st" id="st"></div>
<div class="grid" id="fl"></div>

{t:'maroon.600',h:'#a4544c',l:'Mid red'},

function hr(h){h=h.replace('#','');if(h.length===3)h=h[0]+h[0]+h[1]+h[1]+h[2]+h[2];return[parseInt(h.slice(0,2),16)/255,parseInt(h.slice(2,4),16)/255,parseInt(h.slice(4,6),16)/255]}
function ln(c){return c<=.04045?c/12.92:Math.pow((c+.055)/1.055,2.4)}
function ok(r,g,b){const R=ln(r),G=ln(g),B=ln(b);const l=Math.cbrt(.4122214708*R+.5363325363*G+.0514459929*B);const m=Math.cbrt(.2119034982*R+.6806995451*G+.1073969566*B);const s=Math.cbrt(.0883024619*R+.2817188376*G+.6299787005*B);return[.2104542553*l+.793617785*m-.0040720468*s,1.9779984951*l-2.428592205*m+.4505937099*s,.0259040371*l+.7827717662*m-.808675766*s]}
function ds(a,b){return Math.sqrt((a[0]-b[0])**2+(a[1]-b[1])**2+(a[2]-b[2])**2)}
const pL=P.map(p=>({...p,lab:ok(...hr(p.h))}));
const ca=new Map();
function nr(hex){const k=hex.toLowerCase();if(ca.has(k))return ca.get(k);const lab=ok(...hr(k));let b=null,bd=Infinity;for(const p of pL){const d=ds(lab,p.lab);if(d<bd){bd=d;b=p}}ca.set(k,b);return b}
function rm(svg){const cm=new Map();const o=svg.replace(/#[0-9a-fA-F]{6}/g,m=>{const n=m.toLowerCase();if(!cm.has(n))cm.set(n,nr(n));return cm.get(n).h});return{r:o,cm}}

const pe=document.getElementById('pal');
P.forEach(p=>{pe.innerHTML+=`<div class="ps"><div class="c" style="background:${p.h}"></div><div class="l">${p.l}</div><div class="h">${p.t}</div></div>`});
let tc=0,uc=new Set();
const fe=document.getElementById('fl');
Object.entries(F).forEach(([n,s])=>{
const{r,cm}=rm(s);
let mh='';
cm.forEach((v,k)=>{if(k!==v.h){mh+=`<div class="ci"><div class="d" style="background:${k}"></div>→<div class="d" style="background:${v.h}"></div>${v.t.split('.')[0]}</div>`;uc.add(k);tc++}});
fe.innerHTML+=`<div class="fc"><h3>${n}</h3><div class="fp"><div class="fs"><div class="lb">Original</div>${s}</div><div class="fs"><div class="lb">Remapped</div>${r}</div></div><div class="cm">${mh}</div></div>`;
});
document.getElementById('st').innerHTML=`<span>${Object.keys(F).length}</span> flags · <span>${uc.size}</span> unique source colors · mapped to <span>${P.length}</span> palette stops`;
